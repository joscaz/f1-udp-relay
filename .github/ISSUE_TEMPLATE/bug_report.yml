name: Bug report
description: Something is wrong with the relay
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much
        detail as you can so we can reproduce the issue quickly.
  - type: input
    id: version
    attributes:
      label: Relay version
      description: Output of `f1-udp-relay --version` or the value in package.json
      placeholder: '0.1.0'
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: 'v20.11.1'
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `pnpm start` with SERVER_URL=...
        2. Start an F1 25 session
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      description: Paste the relay's console output. Run with `--verbose` if possible.
      render: shell
