name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    name: Verify before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm format:check

  build-windows:
    name: Build Windows binary
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Windows .exe
        run: pnpm build:win

      - name: Assemble release bundle
        shell: bash
        run: |
          mkdir -p dist/bundle
          cp dist/f1-udp-relay-win-x64.exe dist/bundle/
          cp .env.example dist/bundle/.env.example
          cp scripts/start-relay.bat dist/bundle/
          cp README.md dist/bundle/
          cp LICENSE dist/bundle/
          cd dist && 7z a "f1-udp-relay-${GITHUB_REF_NAME}-win-x64.zip" bundle

      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: |
            dist/f1-udp-relay-win-x64.exe
            dist/f1-udp-relay-*-win-x64.zip
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/f1-udp-relay-win-x64.exe
            dist/f1-udp-relay-*-win-x64.zip

  npm-publish:
    name: Publish to npm (optional)
    needs: verify
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Publish (skipped if NPM_TOKEN is not set)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret not configured; skipping npm publish."
            exit 0
          fi
          pnpm publish --no-git-checks --access public
